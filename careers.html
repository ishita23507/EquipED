<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore Careers - EquipED</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="logo">EquipED</h1>
            <nav class="nav">
                <a href="index.html" class="nav-link">Home</a>
                <a href="careers.html" class="nav-link active">Careers</a>
                <a href="opportunities.html" class="nav-link">Opportunities</a>
                <a href="progress.html" class="nav-link">Progress</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="page-header">
            <h2>Explore Careers</h2>
            <p>Click on any career to learn more about it.</p>
        </section>

        <div class="search-box">
            <input type="text" id="careerSearch" placeholder="Search careers..." class="search-input">
        </div>

        <div class="filter-tabs">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="technology">Technology</button>
            <button class="filter-btn" data-filter="healthcare">Healthcare</button>
            <button class="filter-btn" data-filter="business">Business</button>
            <button class="filter-btn" data-filter="creative">Creative</button>
            <button class="filter-btn" data-filter="education">Education</button>
        </div>

        <div class="careers-grid" id="careersGrid">
            <!-- Careers will be loaded here by JavaScript -->
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>Built for students with limited resources.</p>
        </div>
    </footer>
<script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            renderCareers();
            setupCareerSearch();
            setupCareerFilters();
        });
    </script>
</body>
</html>
