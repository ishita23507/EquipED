<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Progress - EquipED</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="logo">EquipED</h1>
            <nav class="nav">
                <a href="index.html" class="nav-link">Home</a>
                <a href="careers.html" class="nav-link">Careers</a>
                <a href="opportunities.html" class="nav-link">Opportunities</a>
                <a href="progress.html" class="nav-link active">Progress</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="page-header">
            <h2>Your Progress</h2>
            <p>Track your learning journey. Your data is saved in your browser.</p>
        </section>

        <!-- Progress Summary -->
        <section class="progress-summary" id="progressSummary">
            <!-- Loaded by JavaScript -->
        </section>

        <!-- Add New Item -->
        <section class="add-item-section">
            <h3>Add New Item</h3>
            <form id="addItemForm" class="add-item-form">
                <select id="itemCategory" class="form-select" required>
                    <option value="">Select Category</option>
                    <option value="internships">Internship</option>
                    <option value="courses">Course</option>
                    <option value="certifications">Certification</option>
                    <option value="projects">Project</option>
                </select>
                <input type="text" id="itemName" class="form-input" placeholder="Item name" required>
                <button type="submit" class="btn btn-primary">Add Item</button>
            </form>
        </section>

        <!-- Progress Lists -->
        <section class="progress-section">
            <h3>💼 Internships</h3>
            <ul class="progress-list" id="internshipsList">
                <!-- Loaded by JavaScript -->
            </ul>
        </section>

        <section class="progress-section">
            <h3>📚 Courses</h3>
            <ul class="progress-list" id="coursesList">
                <!-- Loaded by JavaScript -->
            </ul>
        </section>

        <section class="progress-section">
            <h3>🏆 Certifications</h3>
            <ul class="progress-list" id="certificationsList">
                <!-- Loaded by JavaScript -->
            </ul>
        </section>

        <section class="progress-section">
            <h3>🛠️ Projects</h3>
            <ul class="progress-list" id="projectsList">
                <!-- Loaded by JavaScript -->
            </ul>
        </section>

        <section class="clear-section">
            <button id="clearProgress" class="btn btn-danger">Clear All Progress</button>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <p>Built for students with limited resources.</p>
        </div>
    </footer>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            renderProgress();
            setupProgressForm();
        });
    </script>
</body>
</html>
